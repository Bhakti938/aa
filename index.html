<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Payroll System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 30px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2.5em;
            position: relative;
        }

        h1:after {
            content: '';
            display: block;
            width: 100px;
            height: 4px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 10px auto;
            border-radius: 2px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-success {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(67, 233, 123, 0.4);
        }

        .btn-warning {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 14px;
            padding: 15px;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        tr:hover {
            background-color: #f8f9fa;
        }

        .action-btn {
            padding: 6px 12px;
            margin: 0 5px;
            font-size: 12px;
            border-radius: 5px;
        }

        .view-btn {
            background: #3498db;
            color: white;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .stat-card h3 {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .stat-card .number {
            font-size: 28px;
            font-weight: bold;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #999;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            position: relative;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .close {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .close:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            table {
                font-size: 12px;
            }
            
            td, th {
                padding: 8px;
            }
            
            .toolbar {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 Employee Payroll System</h1>
        
        <!-- Statistics Cards -->
        <div class="stats-container">
            <div class="stat-card">
                <h3>Total Employees</h3>
                <div class="number" id="totalEmployees">0</div>
            </div>
            <div class="stat-card">
                <h3>Full Time</h3>
                <div class="number" id="fullTimeCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Part Time</h3>
                <div class="number" id="partTimeCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Contractors</h3>
                <div class="number" id="contractorCount">0</div>
            </div>
        </div>
        
        <!-- Toolbar -->
        <div class="toolbar">
            <button class="btn-primary" onclick="showAddModal()">
                <span>➕</span> Add Employee
            </button>
            <button class="btn-success" onclick="loadEmployees()">
                <span>🔄</span> Refresh
            </button>
            <button class="btn-warning" onclick="processPayroll()">
                <span>💰</span> Process Payroll
            </button>
        </div>
        
        <!-- Employee List -->
        <div id="employeeList"></div>
    </div>

    <!-- Add Employee Modal -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAddModal()">&times;</span>
            <h2>Add New Employee</h2>
            
            <div class="form-group">
                <label>Employee Name</label>
                <input type="text" id="empName" placeholder="Enter full name">
            </div>
            
            <div class="form-group">
                <label>Department</label>
                <input type="text" id="empDept" placeholder="Enter department">
            </div>
            
            <div class="form-group">
                <label>Employee Type</label>
                <select id="empType">
                    <option value="FullTime">Full Time</option>
                    <option value="PartTime">Part Time</option>
                    <option value="Contractor">Contractor</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Salary/Rate ($)</label>
                <input type="number" id="empSalary" placeholder="Enter amount">
            </div>
            
            <div class="form-actions">
                <button class="btn-primary" onclick="addEmployee()">Save</button>
                <button class="btn-warning" onclick="closeAddModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- View Employee Modal -->
    <div id="viewModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeViewModal()">&times;</span>
            <h2>Employee Details</h2>
            <div id="employeeDetails"></div>
        </div>
    </div>

    <script>
        // Initialize data
        let employees = JSON.parse(localStorage.getItem('employees') || '[]');
        
        // Load employees on page load
        window.onload = function() {
            loadEmployees();
        };

        function loadEmployees() {
            const listDiv = document.getElementById('employeeList');
            
            if (employees.length === 0) {
                listDiv.innerHTML = '<div class="empty-state">📭 No employees found. Click "Add Employee" to get started!</div>';
                updateStats();
                return;
            }
            
            let html = '<table><tr><th>ID</th><th>Name</th><th>Department</th><th>Type</th><th>Salary</th><th>Actions</th></tr>';
            
            employees.forEach((emp, index) => {
                html += `<tr>
                    <td>${emp.id}</td>
                    <td>${emp.name}</td>
                    <td>${emp.department}</td>
                    <td><span style="
                        padding: 3px 8px;
                        border-radius: 12px;
                        font-size: 12px;
                        font-weight: bold;
                        background-color: ${getTypeColor(emp.type)};
                        color: white;
                    ">${emp.type}</span></td>
                    <td>$${parseFloat(emp.salary).toFixed(2)}</td>
                    <td>
                        <button class="action-btn view-btn" onclick="viewEmployee('${emp.id}')">👁️ View</button>
                        <button class="action-btn delete-btn" onclick="deleteEmployee('${emp.id}')">🗑️ Delete</button>
                    </td>
                </tr>`;
            });
            
            html += '</table>';
            listDiv.innerHTML = html;
            updateStats();
        }
        
        function getTypeColor(type) {
            switch(type) {
                case 'FullTime': return '#2ecc71';
                case 'PartTime': return '#f39c12';
                case 'Contractor': return '#9b59b6';
                default: return '#95a5a6';
            }
        }
        
        function showAddModal() {
            document.getElementById('addModal').style.display = 'flex';
        }
        
        function closeAddModal() {
            document.getElementById('addModal').style.display = 'none';
            // Clear form
            document.getElementById('empName').value = '';
            document.getElementById('empDept').value = '';
            document.getElementById('empSalary').value = '';
        }
        
        function addEmployee() {
            const name = document.getElementById('empName').value.trim();
            const dept = document.getElementById('empDept').value.trim();
            const type = document.getElementById('empType').value;
            const salary = document.getElementById('empSalary').value;
            
            if (!name || !dept || !salary) {
                alert('Please fill in all fields!');
                return;
            }
            
            const employee = {
                id: 'EMP' + String(employees.length + 1).padStart(3, '0'),
                name: name,
                department: dept,
                type: type,
                salary: parseFloat(salary),
                hireDate: new Date().toISOString().split('T')[0],
                email: '',
                phone: ''
            };
            
            employees.push(employee);
            localStorage.setItem('employees', JSON.stringify(employees));
            closeAddModal();
            loadEmployees();
            showNotification('Employee added successfully!', 'success');
        }
        
        function deleteEmployee(id) {
            if (confirm('Are you sure you want to delete this employee?')) {
                employees = employees.filter(e => e.id !== id);
                localStorage.setItem('employees', JSON.stringify(employees));
                loadEmployees();
                showNotification('Employee deleted successfully!', 'info');
            }
        }
        
        function viewEmployee(id) {
            const emp = employees.find(e => e.id === id);
            const detailsDiv = document.getElementById('employeeDetails');
            
            detailsDiv.innerHTML = `
                <div style="padding: 20px;">
                    <p><strong>ID:</strong> ${emp.id}</p>
                    <p><strong>Name:</strong> ${emp.name}</p>
                    <p><strong>Department:</strong> ${emp.department}</p>
                    <p><strong>Type:</strong> ${emp.type}</p>
                    <p><strong>Salary:</strong> $${emp.salary.toFixed(2)}</p>
                    <p><strong>Hire Date:</strong> ${emp.hireDate}</p>
                </div>
            `;
            
            document.getElementById('viewModal').style.display = 'flex';
        }
        
        function closeViewModal() {
            document.getElementById('viewModal').style.display = 'none';
        }
        
        function processPayroll() {
            if (employees.length === 0) {
                alert('No employees to process payroll!');
                return;
            }
            
            let totalPayroll = 0;
            let details = '📊 PAYROLL SUMMARY\n\n';
            
            employees.forEach(emp => {
                totalPayroll += emp.salary;
                details += `${emp.name}: $${emp.salary.toFixed(2)}\n`;
            });
            
            details += `\nTotal Payroll: $${totalPayroll.toFixed(2)}`;
            details += `\nAverage Salary: $${(totalPayroll/employees.length).toFixed(2)}`;
            
            alert(details);
        }
        
        function updateStats() {
            const total = employees.length;
            const fullTime = employees.filter(e => e.type === 'FullTime').length;
            const partTime = employees.filter(e => e.type === 'PartTime').length;
            const contractors = employees.filter(e => e.type === 'Contractor').length;
            
            document.getElementById('totalEmployees').textContent = total;
            document.getElementById('fullTimeCount').textContent = fullTime;
            document.getElementById('partTimeCount').textContent = partTime;
            document.getElementById('contractorCount').textContent = contractors;
        }
        
        function showNotification(message, type) {
            // Simple alert for now
            alert(message);
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const addModal = document.getElementById('addModal');
            const viewModal = document.getElementById('viewModal');
            
            if (event.target === addModal) {
                closeAddModal();
            }
            if (event.target === viewModal) {
                closeViewModal();
            }
        }
    </script>
</body>
</html>
